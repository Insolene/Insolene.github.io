<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Man | Contato</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
          * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
        background-color: #f4f4f4;
        background-image:  linear-gradient(30deg, #eeeeee 12%, transparent 12.5%, transparent 87%, #eeeeee 87.5%, #eeeeee), 
                           linear-gradient(150deg, #eeeeee 12%, transparent 12.5%, transparent 87%, #eeeeee 87.5%, #eeeeee), 
                           linear-gradient(30deg, #eeeeee 12%, transparent 12.5%, transparent 87%, #eeeeee 87.5%, #eeeeee), 
                           linear-gradient(150deg, #eeeeee 12%, transparent 12.5%, transparent 87%, #eeeeee 87.5%, #eeeeee), 
                           linear-gradient(60deg, #e5e5e5 25%, transparent 25.5%, transparent 75%, #e5e5e5 75%, #e5e5e5), 
                           linear-gradient(60deg, #e5e5e5 25%, transparent 25.5%, transparent 75%, #e5e5e5 75%, #e5e5e5);
        background-size: 80px 140px; 
        background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
    }
        header {position: sticky;top: 0;width: 100%;background: #fff;display: flex;justify-content: space-between;align-items: center;padding: 15px 60px;z-index: 1000;border-bottom: 1px solid #ddd;}
        .logo { font-family: 'Oswald', sans-serif; font-size: 24px; letter-spacing: 2px; text-decoration: none; color: #000; }
        nav a { margin-left: 30px; text-decoration: none; color: #666; font-size: 12px; text-transform: uppercase; }
        nav a:hover, nav a.active { color: #000; font-weight: 700; }


        .container { padding: 80px 10%; text-align: center; }
        .titulo-secao { font-family: 'Oswald', sans-serif; font-size: 32px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .subtitulo { color: #888; font-size: 14px; margin-bottom: 60px; }

        .contato-wrapper { 
            display: flex; justify-content: center; align-items: flex-start; 
            gap: 100px; text-align: left; max-width: 1000px; margin: 0 auto;
        }

        .contato-info { width: 300px; }
        .info-item { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .circle-icon { 
            background: #222; color: #fff; width: 40px; height: 40px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 18px;
        }
        .info-text span { display: block; font-size: 12px; color: #888; }
        .info-text strong { font-size: 14px; color: #222; }

        .contato-form { 
            background: #fdfdfd; padding: 40px; border: 1px solid #eee; 
            border-radius: 8px; flex-grow: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .contato-form input, .contato-form textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            border: 1px solid #ddd; border-radius: 4px; outline: none;
            font-size: 13px;
        }
        .contato-form textarea { height: 120px; resize: none; }
        .btn-enviar { 
            background: #333; color: #fff; width: 100%; padding: 15px; 
            border: none; cursor: pointer; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-enviar:hover { background: #000; }

        @media (max-width: 850px) {
            .contato-wrapper { flex-direction: column; gap: 50px; align-items: center; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">FLOW MAN</a>
        <nav>
            <a href="index.html">INÍCIO</a>
            <a href="produtos.html">PRODUTOS</a>
            <a href="sobre.html">SOBRE</a>
            <a href="contato.html" class="active">CONTATO</a>
        </nav>
    </header>

    <main class="container">
        <h2 class="titulo-secao">Contato</h2>
        <p class="subtitulo">Fale conosco! Estamos prontos para ajudar</p>

        <div class="contato-wrapper">
            <div class="contato-info">
                <div class="info-item">
                    <div class="circle-icon">💬</div>
                    <div class="info-text">
                        <span>WhatsApp</span>
                        <strong>(47) 98831-4593</strong>
                    </div>
                </div>
                <div class="info-item">
                    <div class="circle-icon">📸</div>
                    <div class="info-text">
                        <span>Instagram</span>
                        <strong>@use.flowman</strong>
                    </div>
                </div>
                <div class="info-item">
                    <div class="circle-icon">📍</div>
                    <div class="info-text">
                        <span>Endereço</span>
                        <strong>Brusque, SC</strong>
                    </div>
                </div>
            </div>

            <form class="contato-form">
                <input type="text" placeholder="Seu nome" required>
                <input type="email" placeholder="Seu e-mail" required>
                <textarea placeholder="Sua mensagem" required></textarea>
                <button type="submit" class="btn-enviar">➤ Enviar Mensagem</button>
            </form>
        </div>
    </main>
</body>
</html>
